version: '3.9'

services:
  backend:
    build:
      context: ./backend
    container_name: dtm-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000
    container_name: dtm-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped